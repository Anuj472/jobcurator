name: Post Jobs to LinkedIn

# Run daily at 9:30 PM IST (4:00 PM UTC)
on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  post-linkedin-jobs:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install dependencies
        run: npm install

      - name: 📦 Ensure groq-sdk is installed
        run: npm install groq-sdk

      - name: 📝 Install TypeScript tools
        run: npm install -g tsx typescript @types/node

      - name: 🚀 Post jobs to LinkedIn (LLM-generated via Groq)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
          LINKEDIN_REFRESH_TOKEN: ${{ secrets.LINKEDIN_REFRESH_TOKEN }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "🚀 Starting daily LinkedIn job posting with Groq LLM..."
          echo "Time: $(date)"
          tsx scripts/post-jobs-daily.ts
          echo "✅ Job posting completed!"

      - name: 📊 Generate posting summary
        if: always()
        run: |
          echo "### LinkedIn Daily Job Posting Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow**: Post Jobs to LinkedIn (Daily)" >> $GITHUB_STEP_SUMMARY
          echo "- **Schedule**: 9:30 PM IST (Daily)" >> $GITHUB_STEP_SUMMARY
          echo "- **Post generation**: Groq LLM (llama-3.1-8b-instant)" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Configuration:**" >> $GITHUB_STEP_SUMMARY
          echo "- Posts per run: 2" >> $GITHUB_STEP_SUMMARY
          echo "- Jobs per post: 5" >> $GITHUB_STEP_SUMMARY
          echo "- Total jobs posted: 10" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📌 Check the logs above for detailed posting information" >> $GITHUB_STEP_SUMMARY
